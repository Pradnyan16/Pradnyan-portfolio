name: Auto-Generate Blog Posts

on:
  schedule:
    # Runs at 08:00 UTC on Mon, Wed, and Fri
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          
          # Only commit if there are changes (a new blog post was added)
          if ! git diff --staged --empty; then
            git commit -m "docs(blog): auto-generate new blog post"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No new blog post was generated. Skipping commit."
          fi
